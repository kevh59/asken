<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASKEN | Official Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #ff0000;
            --black: #000000;
            --dark-grey: #111111;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--black); color: var(--white); font-family: 'Inter', sans-serif; }

        /* Navbar Merah */
        .navbar {
            background-color: var(--red);
            padding: 15px 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo { font-family: 'Montserrat', sans-serif; font-size: 1.8rem; color: var(--white); text-decoration: none; }

        /* Hero Section - Background dari file lokal (Gambar Blob yang lu download) */
        .hero {
            height: 100vh;
            width: 100%;
            /* Fallback background warna merah tua biar tulisan kelihatan kalau gambar gagal load */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('assets/bg-home.jpg'); 
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .hero-content { background: rgba(255, 255, 255, 0.85); padding: 40px 60px; border-radius: 4px; }
        .hero-title { font-family: 'Montserrat', sans-serif; font-size: 6rem; color: var(--black); line-height: 1; }
        .hero-slogan { font-size: 1.5rem; color: var(--black); font-weight: 900; letter-spacing: 5px; text-transform: uppercase; margin-top: 10px; }

        /* Product Section */
        .products { padding: 80px 10%; }
        .label { color: var(--red); font-family: 'Montserrat', sans-serif; font-size: 2.5rem; margin-bottom: 50px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .card { background: var(--dark-grey); border: 2px solid var(--red); padding: 25px; text-align: center; transition: 0.3s; }
        .card:hover { transform: translateY(-10px); }
        .card-img { width: 100%; aspect-ratio: 1/1; background: #000; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .card-img img { width: 100%; object-fit: contain; }
        .price { color: var(--red); font-weight: bold; font-size: 1.5rem; margin-bottom: 20px; }
        .btn { width: 100%; padding: 15px; background: var(--red); border: none; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        /* Footer Merah */
        footer { background: var(--red); color: var(--black); text-align: center; padding: 40px; font-weight: bold; margin-top: 50px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="#" class="logo">ASKEN</a>
        <div style="font-weight: bold;">STORE</div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1 class="hero-title">ASKEN</h1>
            <p class="hero-slogan">ASKEN HELPS YOU FLY</p>
        </div>
    </header>

    <section class="products">
        <h2 class="label">EXCLUSIVE COLLECTION</h2>
        <div class="grid">
            
            <div class="card">
                <div class="card-img"><img src="https://th.bing.com/th/id/OIP.lqbG_Kme4ugIrCACebVLfgHaHa?w=187&h=187&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3" alt="P1"></div>
                <h3>ASKEN V1 RED</h3>
                <p class="price">1.099.000Rp</p>
                <button class="btn">BELI SEKARANG</button>
            </div>

            <div class="card">
                <div class="card-img"><img src="https://th.bing.com/th/id/OIP.4PWVtakAh0XnLk2xl-F7wQHaHa?w=187&h=187&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3" alt="P2"></div>
                <h3>ASKEN V2 BLACK</h3>
                <p class="price">1.099.000Rp</p>
                <button class="btn">BELI SEKARANG</button>
            </div>

            <div class="card">
                <div class="card-img"><img src="https://th.bing.com/th/id/OIP.b-Bpkecf4vUcp363KbkuEQHaHa?w=187&h=187&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3" alt="P3"></div>
                <h3>ASKEN PRO PHANTOM</h3>
                <p class="price">1.999.000Rp</p>
                <button class="btn">BELI SEKARANG</button>
            </div>

        </div>
    </section>

    <footer>
        <p>&copy; 2026 ASKEN BRAND - FLY BEYOND LIMITS</p>
    </footer>

</body>
</html>
