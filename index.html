<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASKEN - Official Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">ASKEN</div>
        <ul class="nav-links">
            <li><a href="#home">Home</a></li>
            <li><a href="#produk">Produk</a></li>
            <li><a href="#">Kontak</a></li>
        </ul>
    </nav>

    <section id="home" class="home-section">
        <div class="hero-image-container">
            <img src="hero-16x4.jpg" alt="ASKEN Hero Banner" class="hero-img">
            <div class="hero-text">
                <h1>ASKEN</h1>
                <p class="slogan">ASKEN HELPS YOU FLY</p>
            </div>
        </div>
    </section>

    <section id="produk" class="product-section">
        <h2 class="section-title">Koleksi Produk</h2>
        <div class="product-grid">
            
            <div class="product-card">
                <div class="img-box">
                    <img src="produk1.png" alt="Sepatu Asken 1">
                </div>
                <h3>ASKEN Vortex Black</h3>
                <p class="price">Rp 1.099.000</p>
                <button class="buy-btn">Beli Sekarang</button>
            </div>

            <div class="product-card">
                <div class="img-box">
                    <img src="produk2.png" alt="Sepatu Asken 2">
                </div>
                <h3>ASKEN Vortex Pro</h3>
                <p class="price">Rp 1.999.899</p>
                <button class="buy-btn">Beli Sekarang</button>
            </div>

        </div>
    </section>

    <footer>
        <p>&copy; 2026 ASKEN Brand. All Rights Reserved.</p>
    </footer>

</body>
</html>
