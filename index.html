<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASKEN | Fly Beyond Limits</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #ff0000;
            --black: #000000;
            --dark: #0a0a0a;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { background-color: var(--black); color: var(--white); font-family: 'Inter', sans-serif; }

        /* --- NAVIGATION --- */
        nav {
            background: var(--red);
            padding: 15px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }
        .logo { font-family: 'Montserrat', sans-serif; font-size: 1.8rem; font-weight: 900; color: white; text-decoration: none; }
        .menu a { color: white; text-decoration: none; font-weight: 700; margin-left: 20px; font-size: 0.9rem; text-transform: uppercase; }

        /* --- HERO SECTION (INI BAGIAN YANG GUE TAMBAHIN LINK GAMBAR LU) --- */
        .hero {
            height: 100vh;
            width: 100%;
            /* LINK GAMBAR BARU LU SUDAH TERPASANG DI SINI */
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.8)), 
                        url('https://i.ibb.co.com/Z1X373ts/asken-home.png');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        .hero h1 { font-family: 'Montserrat', sans-serif; font-size: 6rem; color: var(--red); line-height: 0.8; text-shadow: 4px 4px 0px white; }
        .hero p { font-weight: 900; font-size: 1.5rem; letter-spacing: 8px; margin-top: 20px; text-transform: uppercase; border: 4px solid white; padding: 10px 30px; }

        /* --- PRODUCT SECTION --- */
        .products { padding: 100px 10%; background: var(--black); }
        .section-title { color: var(--red); font-family: 'Montserrat', sans-serif; font-size: 3rem; text-align: center; margin-bottom: 50px; }
        
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 40px; }
        
        .product-card { background: var(--dark); border-bottom: 5px solid var(--red); padding: 20px; transition: 0.4s; position: relative; overflow: hidden; }
        .product-card:hover { transform: translateY(-10px); background: #151515; }
        
        .product-card img { width: 100%; height: auto; margin-bottom: 20px; }
        .product-card h3 { font-family: 'Montserrat', sans-serif; font-size: 1.2rem; margin-bottom: 10px; }
        .product-card .price { color: var(--red); font-size: 1.5rem; font-weight: bold; margin-bottom: 20px; display: block; }
        
        .buy-btn { width: 100%; padding: 15px; background: var(--red); border: none; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .buy-btn:hover { background: white; color: var(--red); }

        /* --- FOOTER --- */
        footer { background: var(--red); color: white; text-align: center; padding: 50px; font-weight: bold; }

        @media (max-width: 768px) {
            .hero h1 { font-size: 3.5rem; }
            .hero p { font-size: 1rem; letter-spacing: 4px; }
        }
    </style>
</head>

                <h3>ASKEN V1 RED BLAZE</h3>
