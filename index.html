<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASKEN | Official Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #ff0000;
            --black: #000000;
            --dark: #0a0a0a;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--black); color: var(--white); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* Navbar Merah */
        .navbar {
            background-color: var(--red);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 10%;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 1.8rem; color: var(--white); }
        .nav-links { list-style: none; display: flex; gap: 25px; }
        .nav-links a { text-decoration: none; color: var(--white); font-weight: bold; font-size: 0.9rem; }

        /* Hero 16:4 */
        .hero { position: relative; width: 100%; aspect-ratio: 16 / 4; overflow: hidden; background-color: #111; }
        .hero-img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.7); }
        .hero-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; width: 100%; }
        .hero-title { font-family: 'Montserrat', sans-serif; font-size: 7vw; color: var(--black); line-height: 1; margin: 0; }
        .hero-slogan { font-size: 1.8vw; color: var(--black); font-weight: 900; letter-spacing: 10px; text-transform: uppercase; margin-top: 5px; }

        /* Products */
        .products { padding: 80px 10%; }
        .label { color: var(--red); font-family: 'Montserrat', sans-serif; font-size: 2rem; margin-bottom: 40px; border-left: 5px solid var(--red); padding-left: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; }
        .card { background: var(--dark); border: 1px solid #222; padding: 20px; transition: 0.4s; text-align: center; }
        .card:hover { border-color: var(--red); transform: translateY(-10px); }
        .card-img { width: 100%; aspect-ratio: 1 / 1; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; background: #000; }
        .card-img img { width: 90%; transition: 0.5s; object-fit: contain; }
        .card:hover img { transform: scale(1.1) rotate(-3deg); }
        .price { color: var(--red); font-weight: bold; font-size: 1.4rem; margin: 15px 0; }
        .btn { width: 100%; padding: 15px; background: var(--red); border: none; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #cc0000; }

        /* Footer */
        .footer { background: var(--red); padding: 40px; text-align: center; font-weight: bold; color: var(--black); margin-top: 60px; }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="logo">ASKEN</div>
        <ul class="nav-links">
            <li><a href="#home">HOME</a></li>
            <li><a href="#shop">SHOP</a></li>
            <li><a href="#">CONTACT</a></li>
        </ul>
    </header>

    <section id="home" class="hero">
        <img src="assets/hero.jpg" alt="ASKEN Banner" class="hero-img">
        <div class="hero-content">
            <h1 class="hero-title">ASKEN</h1>
            <p class="hero-slogan">ASKEN HELPS YOU FLY</p>
        </div>
    </section>

    <section id="shop" class="products">
        <h2 class="label">LATEST DROPS</h2>
        <div class="grid">
            <div class="card">
                <div class="card-img"><img src="assets/produk1.png" alt="Produk 1"></div>
                <h3>VORTEX MID-BLACK</h3>
                <p class="price">Rp 1.099.000</p>
                <button class="btn">BELI SEKARANG</button>
            </div>
            <div class="card">
                <div class="card-img"><img src="assets/produk2.png" alt="Produk 2"></div>
                <h3>VORTEX PRO MAX</h3>
                <p class="price">Rp 1.999.899</p>
                <button class="btn">BELI SEKARANG</button>
            </div>
        </div>
    </section>

    <footer class="footer">
        <p>&copy; 2026 ASKEN BRAND - ENGINEERED FOR SPEED</p>
    </footer>

</body>
</html>
